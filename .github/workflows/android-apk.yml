name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --wait --json > eas-build-result.json
      - name: Initialize EAS project
        run: eas init --non-interactive
      - name: Download APK
        run: node scripts/download-eas-apk.js eas-build-result.json ogrodzenia.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ogrodzenia-apk
          path: ogrodzenia.apk
